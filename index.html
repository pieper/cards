<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Klondike Solitaire</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>♠</text></svg>">
<link rel="stylesheet" href="styles.css">
</head>
<body>
  <header id="toolbar">
    <span class="brand">♠ Klondike</span>
    <button id="newGame">New Game</button>
    <button id="undo">Undo</button>
    <button id="finish" hidden>Auto‑finish</button>
    <label class="toggle"><input type="checkbox" id="drawThree" checked> Turn‑3</label>
    <label class="toggle"><input type="checkbox" id="autoplay" checked> Autoplay obvious</label>
    <label class="toggle">Deck
      <select id="deck">
        <option value="knoll">Classic</option>
        <option value="fomin">English</option>
      </select>
    </label>
    <span id="status"></span>
  </header>

  <div id="stage">
    <div id="board"></div>
  </div>

  <div id="winOverlay" hidden>
    <div class="win-card">
      <h1>You win! 🎉</h1>
      <div id="winImageWrap"><div class="spinner"></div></div>
      <p id="winCaption"></p>
      <button id="winNew">Play again</button>
    </div>
  </div>

  <script src="solitaire.js"></script>
</body>
</html>
