<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Klondike Solitaire</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>♠</text></svg>">
<link rel="stylesheet" href="styles.css">
<!-- PWA: installable + offline -->
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0b6e3b">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Solitaire">
<link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">
</head>
<body>
  <header id="toolbar">
    <span class="brand">♠ Klondike</span>
    <button id="newGame">New Game</button>
    <button id="undo">Undo</button>
    <button id="finish" hidden>Auto‑finish</button>
    <label class="toggle" id="turn3label"><input type="checkbox" id="drawThree" checked> Turn‑3</label>
    <label class="toggle"><input type="checkbox" id="autoplay" checked> Autoplay obvious</label>
    <label class="toggle">Deck
      <select id="deck">
        <option value="knoll">Classic</option>
        <option value="fomin">English</option>
        <option value="phone">Phone</option>
      </select>
    </label>
    <label class="toggle"><input type="checkbox" id="oddsToggle"> Odds</label>
    <span id="status"></span>
  </header>

  <div id="stage">
    <div id="board"></div>
  </div>

  <canvas id="winchart" title="Estimated win chance — expected (line) with optimistic/pessimistic band"></canvas>

  <button id="wandFab" class="fab" aria-label="Auto-play a move">🪄</button>
  <button id="dealFab" class="fab" aria-label="Deal from the deck"></button>

  <div id="installBanner" hidden>
    <span id="installMsg"></span>
    <button id="installBtn" hidden>Install</button>
    <button id="installClose" aria-label="Dismiss">✕</button>
  </div>

  <div id="winOverlay" hidden>
    <div class="win-card">
      <h1>You win! 🎉</h1>
      <div id="winImageWrap"><div class="spinner"></div></div>
      <p id="winCaption"></p>
      <div id="winOddsWrap" hidden>
        <div id="winOddsTitle">How your odds ran this game</div>
        <canvas id="winchartFinal"></canvas>
      </div>
      <button id="winNew">Play again</button>
    </div>
  </div>

  <script src="solitaire.js"></script>
</body>
</html>
